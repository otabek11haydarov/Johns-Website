<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grammar Test</title>
    <!-- Include Bootstrap or standard styles -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="grammar_test.css" />
</head>
<body class="dark-mode">
    <div class="test-container">
        <!-- Header with Progress -->
        <header class="test-header">
            <h2 id="testTitle">Grammar Test</h2>
            <div class="progress-wrapper">
                <div class="progress">
                    <div id="progressBar" class="progress-bar bg-primary" role="progressbar" style="width: 0%;"></div>
                </div>
                <div class="progress-text" id="progressText">0 / 0</div>
            </div>
        </header>

        <!-- Main Question Area -->
        <main class="test-main" id="testMain">
            <div class="spinner-border text-primary" role="status" id="loadingSpinner">
                <span class="visually-hidden">Loading...</span>
            </div>
            
            <div id="questionContainer" class="d-none">
                <div class="question-card" id="questionCard">
                    <h4 class="question-text" id="questionText">Question goes here</h4>
                    
                    <div class="options-container" id="optionsContainer">
                        <!-- Options injected here -->
                    </div>
                </div>
            </div>

            <!-- Result Summary Area -->
            <div id="resultContainer" class="d-none">
                <div class="result-summary text-center">
                    <h3 id="resultScore">Score: 0%</h3>
                    <p id="resultText">You got 0 out of 0 correct.</p>
                </div>
                <div class="feedback-list" id="feedbackList">
                    <!-- Feedback injected here -->
                </div>
            </div>
        </main>

        <!-- Footer / Navigation -->
        <footer class="test-footer" id="testFooter">
            <button class="btn btn-outline-secondary" id="btnPrev" disabled>Previous</button>
            <button class="btn btn-primary" id="btnNext" disabled>Next</button>
            <button class="btn btn-success d-none" id="btnSubmit">Submit Test</button>
        </footer>
        
        <footer class="test-footer d-none" id="resultFooter">
            <button class="btn btn-primary" onclick="window.close()">Close & Return</button>
        </footer>
    </div>

    <!-- Confirm Modal -->
    <div class="modal fade" id="submitConfirmModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content custom-modal">
                <div class="modal-header border-0">
                    <h5 class="modal-title">Submit Test</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    Are you sure you want to submit your answers? You will not be able to change them.
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="btnConfirmSubmit">Yes, Submit</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../shared/config.js"></script>
    <script src="grammar_test.js"></script>
</body>
</html>
