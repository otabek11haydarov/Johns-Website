<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LMS Portal - Login</title>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <main class="auth-shell">
      <section class="auth-hero">
        <p class="hero-tag">Welcome back</p>
        <h1>Modern account access for your workspace</h1>
        <p class="hero-text">
          Access your courses, tasks, and profile. Secure and fast portal for students, teachers, and admins.
        </p>
        <div class="hero-glow hero-glow-one"></div>
        <div class="hero-glow hero-glow-two"></div>
      </section>

      <form id="form" class="auth-card">
        <div class="form-copy">
          <p class="eyebrow">Account portal</p>
          <h2 id="formTitle">Login</h2>
          <p id="formDescription" class="form-description">
            Access your account and continue your workflow.
          </p>
        </div>

        <div class="field-grid">
          <div class="field">
            <label for="username">Username</label>
            <input id="username" type="text" placeholder="Enter username" required />
          </div>

          <div class="field">
            <label for="password">Password</label>
            <input id="password" type="password" placeholder="Enter password" required />
          </div>
        </div>

        <!-- Error Message Display -->
        <p id="errorMessage" style="color: #ff6b6b; font-size: 0.9rem; margin: 4px 0 0; display: none; text-align: center; font-weight: 500;"></p>

        <input type="submit" id="loginBtn" value="Login" />
      </form>
    </main>
    <script src="login.js"></script>
  </body>
</html>
